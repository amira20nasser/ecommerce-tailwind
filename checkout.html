<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css" rel="stylesheet">

    <title>Cart</title>
</head>

<body class="bg-gray-100">
    <header class="bg-[#0f1b2d] text-white w-full">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">
            <h1 class="text-lg md:text-xl font-semibold">Mira E-commerce</h1>

            <!--  Desktop -->
            <nav class="hidden md:flex gap-6 text-sm text-gray-300">
                <a href="./index.html" class="text-white">Home</a>
                <a href="./products.html" class="hover:text-white">Products</a>
                <a href="./categories.html" class="hover:text-white">Categories</a>
            </nav>

            <div class="flex items-center gap-4">
                <button onclick="window.location.href='./checkout.html'" class=" text-gray-300 hover:text-white">
                    <i class="fa-solid fa-bag-shopping"></i>
                </button>

                <img id="profile-image" src="https://i.pravatar.cc/40"
                    class="hidden w-8 h-8 rounded-full border border-gray-400" />

                <button id="sign-in" class="bg-gray-800 px-3 py-2 rounded-xl text-sm hover:bg-gray-700">
                    Sign in
                </button>
            </div>
        </div>

        <!-- Mobile -->
        <div class="md:hidden px-4 pb-4 flex gap-4 items-center text-sm text-gray-300">
            <a href="#" class="text-white">Home</a>
            <a href="./products.html">Products</a>
            <a href="./categories.html">Categories</a>
        </div>
    </header>
    <div class="max-w-5xl mx-auto p-6">
        <div id="cart-container" class="space-y-4"></div>

        <div id="price-div" class="mt-8 bg-white py-4 px-6 rounded-xl shadow flex justify-between items-center">
            <h2 class="text-xl font-semibold">Total:</h2>
            <span id="total-price" class="text-2xl font-bold text-[#15253f]">$0</span>
        </div>
    </div>
    <!-- sign in pop up -->
    <div id="modal" class="text-white fixed inset-0 bg-black/60 hidden items-center justify-center z-50">

        <div class="bg-[#0f1b2d] p-8 rounded-2xl w-full max-w-md relative">

            <button onclick="closeModal()" class="absolute top-3 right-3 text-white text-xl">&times;</button>

            <h2 class="text-3xl text-center font-bold mb-6">Sign In</h2>

            <form id="login-form" class="space-y-5">

                <div>
                    <label for="username" class="text-sm text-gray-300">User Name</label>
                    <input id="username" type="username" placeholder="Enter your username"
                        class="w-full mt-1 px-4 py-2 rounded-lg bg-white/20 text-white outline-none" />
                    <div id="username-error" class="text-red-300 text-sm"></div>
                </div>

                <div>
                    <label class="text-sm text-gray-300">Password</label>
                    <input id="password" type="password" placeholder="Enter your password"
                        class="w-full mt-1 px-4 py-2 rounded-lg bg-white/20 text-white outline-none" />
                    <div id="password-error" class="text-red-300 text-sm"></div>
                </div>

                <button id="login-btn" disabled
                    class="w-full mt-6 py-3 rounded-lg bg-gray-500 cursor-not-allowed text-white">
                    Sign In
                </button>
            </form>

            <p class="text-center text-sm mt-6 text-gray-300">
                Don't have an account?
                <a href="#" class="text-blue-400 hover:underline">Sign up</a>
            </p>
        </div>
    </div>
    <script type="module" src="./checkout.js"></script>
</body>

</html>
