<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>Categories</title>
</head>

<body class="bg-gray-50">
    <header class="bg-white shadow-sm text-center">
        <div class="max-w-6xl mx-auto px-4 py-5">
            <h1 class="text-2xl font-bold text-gray-800">Shop Categories</h1>
            <p class="text-gray-500 text-sm">Browse products by category</p>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-8">

        <div id="loading" class="text-gray-500">Loading categories...</div>

        <div id="categories" class="hidden grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-5">
        </div>

    </main>

    <script src="./categories.js"></script>

</body>

</html>
