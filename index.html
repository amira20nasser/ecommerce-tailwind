<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Home Page</title>
</head>

<body class="bg-gray-50">
    <header class="bg-[#0f1b2d] text-white w-full">
        <div class="max-w-7xl mx-auto px-4 py-4 flex items-center justify-between">

            <h1 class="text-lg md:text-xl font-semibold">
                Mira E-commerce
            </h1>

            <nav class="hidden md:flex items-center gap-6 text-sm text-gray-300">
                <a href="#" class="hover:text-white transition text-white">Home</a>
                <a href="#" class="hover:text-white transition">Products</a>
                <a href="#" class="hover:text-white transition">Categories</a>
            </nav>

            <div class="flex items-center gap-4">
                <div class="hidden md:block">
                    <input type="text" placeholder="Search"
                        class="bg-[#1c2a3f] text-sm px-4 py-2 rounded-lg outline-none placeholder-gray-400 w-56" />
                </div>

                <div class="flex items-center gap-3 text-gray-300">
                    <button class="hover:text-white">
                        <i class="fa-duotone fa-solid fa-bag-shopping"></i>
                    </button>
                </div>

                <!-- Profile  if login -->
                <img src="https://i.pravatar.cc/40" class="w-8 h-8 rounded-full border border-gray-400" alt="profile" />
                <!-- sign in  -->
                <!-- <button class="bg-gray-800 text-white text-[15px] px-2 py-2 rounded-xl hover:bg-gray-800">
                    Sign in
                </button> -->

            </div>
        </div>

        <!-- mobile -->
        <div class="md:hidden px-4 pb-4 flex gap-4 text-sm text-gray-300">
            <a href="#" class="hover:text-white transition text-white">Home</a>
            <a href="#" class="hover:text-white transition">Products</a>
            <a href="#" class="hover:text-white transition">Categories</a>
        </div>
    </header>
    <section class="relative h-[70vh] md:h-[85vh] w-full">
        <img src="./images/hero1.jpg" alt="Ecommerce" class="absolute inset-0 w-full h-full object-cover" />
        <div class="absolute inset-0 bg-black/20"></div>
        <div class="relative z-10 flex flex-col justify-center items-center text-center h-full px-4">

            <h1 class="text-white text-3xl md:text-5xl font-bold mb-4">
                Discover Your Style
            </h1>

            <p class="text-gray-200 text-sm md:text-lg max-w-xl mb-6">
                Shop the latest trends in fashion, electronics, and more all in one place.
            </p>


            <div class="flex flex-col sm:flex-row gap-4 justify-center md:justify-start">
                <button class="bg-[#0F172A] text-white px-6 py-3 rounded-xl hover:bg-gray-800 transition">
                    Shop Now
                </button>

                <button
                    class="bg-[#FFFFFF]/40 text-white border border-gray-300 px-6 py-3 rounded-xl hover:bg-gray-100 hover:text-black transition">
                    Browse Categories
                </button>
            </div>
        </div>

    </section>

</body>

</html>
